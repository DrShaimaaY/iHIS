{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Upload X-ray Image</h2>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-warning">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="xray_image" class="form-label">Select an X-ray image</label>
                    <input class="form-control" type="file" id="xray_image" name="xray_image" accept=".jpg,.jpeg,.png" required>
                </div>
                <button type="submit" class="btn btn-primary">Analyze Image</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
